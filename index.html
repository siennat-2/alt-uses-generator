<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alternate Uses Generator</title>
<style>
  body {font-family:Arial,Helvetica,sans-serif; max-width:720px; margin:2rem auto; line-height:1.6;}
  textarea, input {width:100%; padding:.5rem; margin-top:.4rem;}
  button {padding:.6rem 1.2rem; margin-top:.6rem; font-size:1rem;}
  .suggestions {background:#f8f8f8; padding:.8rem; margin-top:1rem; border:1px solid #ddd;}
  .suggestions li {cursor:pointer; margin-bottom:.4rem;}
</style>
</head>
<body>

<h1>Think of Alternative Uses</h1>

<label for="object">Object (e.g., “brick”):</label>
<input id="object" type="text" placeholder="Enter object name">

<label for="own">Your own ideas (one per line):</label>
<textarea id="own" rows="6" placeholder="1. …&#10;2. …"></textarea>

<button id="genBtn">🔀 Stuck? Generate ideas</button>

<div id="results" class="suggestions" hidden>
  <h3>AI‑generated suggestions (click to copy)</h3>
  <ul id="list"></ul>
</div>

<script>
// ==== CONFIG ====
const VERCELO_ENDPOINT = "https://alt-uses-generator.vercel.app/"; // <-- replace!
const SESSION_ID = Math.random().toString(36).substr(2, 9); // short random id

let clickCount = 0;

// Helper to POST JSON
async function postJSON(url, data) {
  const r = await fetch(url, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// Click handler
document.getElementById("genBtn").addEventListener("click", async () => {
  const object = document.getElementById("object").value.trim();
  const participantRaw = document.getElementById("own").value.trim();

  if (!object) return alert("Please type an object.");

  clickCount += 1; // count this press

  try {
    const payload = {
      session_id: SESSION_ID,
      object,
      click_number: clickCount,
      participant_raw: participantRaw
    };
    const { suggestions } = await postJSON(VERCELO_ENDPOINT, payload);

    // Show suggestions
    const ul = document.getElementById("list");
    ul.innerHTML = "";
    suggestions.forEach(txt => {
      const li = document.createElement("li");
      li.textContent = txt;
      li.title = "Click to copy";
      li.onclick = () => {
        navigator.clipboard.writeText(txt);
        li.style.background = "#e0ffe0";
        setTimeout(()=>li.style.background="",1500);
      };
      ul.appendChild(li);
    });
    document.getElementById("results").hidden = false;
  } catch (e) {
    console.error(e);
    alert("Something went wrong – check console for details.");
  }
});
</script>

</body>
</html>
